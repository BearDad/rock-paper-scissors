<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rock Paper Scissors</title>
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div>
      <h1>Rock, Paper Scissors</h1>
    </div>
    <p>
      Computer score: <span id="computerScore"> </span> human score:
      <span id="humanScore"></span>
    </p>
    <p>
      <button type="button" id="rBtn" onclick="getHumanChoice('rock')">
        Rock
      </button>
      <button type="button" id="pBtn" onclick="getHumanChoice('paper')">
        Paper
      </button>
      <button type="button" id="sBtn" onclick="getHumanChoice('scissors')">
        Scissors
      </button>
      <span id="result"></span>
    </p>
    <p id="finalResult">
      <button class="hidden" id="restartBtn" type="btn" onclick="reset()">
        restart
      </button>
      <span class="hidden" id="finalResultText"></span>
    </p>
    <script src="./game.js"></script>
  </body>
</html>
